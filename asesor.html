<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Asesor Ultra Seco</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f7; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 90%; max-width: 450px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        .header { background: #2c3e50; color: white; padding: 20px; text-align: center; font-size: 1.2em; font-weight: bold; }
        #chat-box { height: 400px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #fff; }
        .msg { padding: 12px 16px; border-radius: 15px; font-size: 0.95em; line-height: 1.4; max-width: 80%; }
        .user { align-self: flex-end; background: #3498db; color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: #f1f0f0; color: #333; border-bottom-left-radius: 2px; }
        .input-area { display: flex; padding: 15px; border-top: 1px solid #eee; background: white; }
        input { flex: 1; border: 1px solid #ddd; padding: 12px; border-radius: 25px; outline: none; transition: border 0.3s; }
        input:focus { border-color: #3498db; }
        button { background: #3498db; color: white; border: none; padding: 10px 20px; margin-left: 10px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        button:hover { background: #2980b9; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">Asesor Ultra Seco 🏠</div>
    <div id="chat-box">
        <div class="msg ai"><b>Asesor:</b> ¡Hola! Soy el experto en impermeabilización. ¿Cómo puedo ayudarte con tu proyecto hoy?</div>
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Escribe tu duda aquí..." onkeypress="revisarEnter(event)">
        <button onclick="enviarMensaje()">ENVIAR</button>
    </div>
</div>

<script src="asesor.js"></script>
</body>
</html>
